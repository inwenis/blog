site_name: programki.eu
theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.copy
plugins:
  - blog:
      blog_dir: .
      pagination_per_page: 30
  - search
  - tags
nav:
  - index.md
extra:
  analytics:
    provider: google
    property: G-MZ0JN1EDPS
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
extra_css:
  - stylesheets/extra.css
